<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valorant Crosshair Vault - Databáze zaměřovačů</title>
    <meta name="description" content="Ukládejte, sdílejte a prozkoumávejte kódy zaměřovačů (crosshairs) ze hry Valorant. Databáze profesionálních i zábavných zaměřovačů s náhledem v reálném čase.">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header Section -->
    <header>
        <div class="header-container">
            <div class="logo-section">
                <h1>Valorant Crosshair <span>Vault</span></h1>
                <p>Trezor pro tvé herní zaměřovače. Ukládej, testuj a sdílej kódy v reálném čase.</p>
            </div>
            <div class="search-filter-section">
                <div class="search-box">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
                        <path d="M18.031 16.6168L22.3137 20.8995L20.8995 22.3137L16.6168 18.031C15.0769 19.263 13.124 20 11 20C6.02944 20 2 15.9706 2 11C2 6.02944 6.02944 2 11 2C15.9706 2 20 6.02944 20 11C20 13.124 19.263 15.0769 18.031 16.6168ZM16.0247 15.8753C17.2475 14.6146 18 12.8956 18 11C18 7.13401 14.866 4 11 4C7.13401 4 4 7.13401 4 11C4 14.866 7.13401 18 11 18C12.8956 18 14.6146 17.2475 15.8753 16.0247L16.0247 15.8753Z"/>
                    </svg>
                    <input type="text" id="search-input" placeholder="Vyhledat hráče, tvar nebo tvůrce...">
                </div>
                <button class="btn btn-primary" id="add-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                        <path d="M11 11V5H13V11H19V13H13V19H11V13H5V11H11Z"/>
                    </svg>
                    Přidat kód
                </button>
            </div>
        </div>
    </header>

    <!-- Main Section -->
    <main>
        <div class="controls-bar">
            <!-- Category Filters -->
            <div class="filter-group" id="filter-group">
                <button class="filter-btn active" data-filter="all">Vše</button>
                <button class="filter-btn" data-filter="pro">Pro Hráči</button>
                <button class="filter-btn" data-filter="fun">Zábavné</button>
                <button class="filter-btn" data-filter="custom">Moje vlastní</button>
            </div>
        </div>

        <!-- Crosshair Cards Grid -->
        <div class="vault-grid" id="vault-grid">
            <!-- Cards will be dynamically inserted here via JS -->
            <div class="empty-state">
                <p>Načítání zaměřovačů...</p>
            </div>
        </div>
    </main>

    <!-- Add Crosshair Modal -->
    <div class="modal" id="add-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Přidat nový zaměřovač</h2>
                <button class="close-btn" id="close-modal" aria-label="Zavřít modal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="add-form">
                    <div class="form-layout">
                        <!-- Left Side: Fields -->
                        <div class="form-fields">
                            <div class="form-group">
                                <label for="name">Název / Hráč</label>
                                <input type="text" id="name" required placeholder="např. TenZ, Srdíčko, Kruh" maxlength="30">
                            </div>
                            <div class="form-group">
                                <label for="code">Kód zaměřovače (Valorant Code)</label>
                                <input type="text" id="code" required placeholder="0;P;c;5;o;1;d;1;z;3;...">
                                <span id="code-feedback" class="feedback"></span>
                            </div>
                            <div class="form-group">
                                <label for="category">Kategorie</label>
                                <select id="category">
                                    <option value="custom">Vlastní / Ostatní</option>
                                    <option value="pro">Pro Hráč</option>
                                    <option value="fun">Zábavný</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="description">Popis</label>
                                <textarea id="description" rows="2" placeholder="Volitelný krátký popis zaměřovače..." maxlength="100"></textarea>
                            </div>
                        </div>

                        <!-- Right Side: Live Canvas Preview -->
                        <div class="preview-panel">
                            <h3>Živý náhled</h3>
                            <div class="modal-canvas-wrapper">
                                <canvas id="modal-preview-canvas" width="180" height="180"></canvas>
                            </div>
                            <div class="form-group preview-options">
                                <label for="preview-bg-select">Pozadí náhledu</label>
                                <select id="preview-bg-select">
                                    <option value="dark">Tmavé pozadí</option>
                                    <option value="green">Zelené plátno</option>
                                    <option value="game">Herní mřížka</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- Footer Actions -->
                    <div class="form-footer">
                        <button type="button" class="btn btn-secondary" id="close-modal-btn" onclick="closeModal()">Zrušit</button>
                        <button type="submit" class="btn btn-primary" id="submit-btn" disabled>Uložit do trezoru</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Toast Notifications Container -->
    <div id="toast-container"></div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Valorant Crosshair Vault. Vytvořeno pro komunitu hráčů hry Valorant. Kódy lze importovat přímo v nastavení hry.</p>
    </footer>

    <!-- Scripts -->
    <script src="crosshair-parser.js"></script>
    <script src="app.js"></script>
</body>
</html>
